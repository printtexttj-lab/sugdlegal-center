<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLC Admin Login</title>
  <style>
    :root{
      --bg:#f5f1e8;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --navy:#14243d;
      --navy2:#1b3153;
      --gold:#b08a46;
      --line:rgba(20,36,61,.08);
      --shadow:0 20px 60px rgba(17,24,39,.12);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(180deg,#f5f1e8,#fbf9f4);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:#fff;
      font-weight:900;
      margin-bottom:18px;
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
    }

    p{
      margin:0 0 22px;
      color:var(--muted);
      line-height:1.6;
    }

    label{
      display:block;
      margin-bottom:14px;
      font-size:14px;
      font-weight:600;
      color:#374151;
    }

    input{
      width:100%;
      margin-top:8px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      outline:none;
      font:inherit;
    }

    input:focus{
      border-color:rgba(176,138,70,.45);
      box-shadow:0 0 0 4px rgba(176,138,70,.10);
    }

    button{
      width:100%;
      margin-top:6px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:#fff;
      font-weight:800;
      cursor:pointer;
      font-size:15px;
    }

    .hint{
      margin-top:14px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SLC</div>
    <h1>Admin Panel</h1>
    <p>Вход только для администратора SLC.</p>

    <form id="loginForm">
      <label>
        Логин
        <input type="text" id="username" required />
      </label>

      <label>
        Пароль
        <input type="password" id="password" required />
      </label>

      <button type="submit">Войти</button>
      <div class="hint" id="loginHint"></div>
    </form>
  </div>

  <script>
    const API_BASE = "https://slc-telegram.printtexttj.workers.dev";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const hint = document.getElementById("loginHint");

      hint.textContent = "Проверяем...";

      try {
        const res = await fetch(API_BASE + "/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Login failed");
        }

        localStorage.setItem("slc_admin_token", data.token);
        window.location.href = "admin-dashboard.html";
      } catch (err) {
        hint.textContent = "Ошибка входа ❌";
      }
    });
  </script>
</body>
</html>
