<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLC Admin Login</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f1e8;
      --bg2:#fbf9f4;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --navy:#14243d;
      --navy2:#1b3153;
      --gold:#b08a46;
      --line:rgba(20,36,61,.08);
      --shadow:0 24px 70px rgba(17,24,39,.10);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(176,138,70,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(20,36,61,.06), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .login-card{
      width:100%;
      max-width:460px;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,243,235,.98));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:30px;
      position:relative;
      overflow:hidden;
    }
    .login-card::before{
      content:"";
      position:absolute;
      left:0;top:0;right:0;height:4px;
      background:linear-gradient(90deg,var(--gold),#d7b978);
    }
    .logo{
      width:64px;
      height:64px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:1px solid rgba(20,36,61,.08);
      overflow:hidden;
      margin-bottom:18px;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }
    h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.1;
      letter-spacing:-.6px;
    }
    p{
      margin:0 0 22px;
      color:var(--muted);
      line-height:1.7;
    }
    label{
      display:block;
      margin-bottom:14px;
      font-size:14px;
      font-weight:700;
      color:#374151;
    }
    input{
      width:100%;
      margin-top:8px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      outline:none;
      font:inherit;
      background:#fff;
    }
    input:focus{
      border-color:rgba(176,138,70,.45);
      box-shadow:0 0 0 4px rgba(176,138,70,.10);
    }
    button{
      width:100%;
      margin-top:8px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:#fff;
      font-weight:800;
      cursor:pointer;
      font-size:15px;
    }
    .hint{
      margin-top:14px;
      min-height:18px;
      color:var(--muted);
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <img src="logo.png" alt="SLC Logo" />
    </div>

    <h1>Admin Panel</h1>
    <p>Вход только для администратора SLC.</p>

    <form id="loginForm">
      <label>
        Логин
        <input type="text" id="username" required />
      </label>

      <label>
        Пароль
        <input type="password" id="password" required />
      </label>

      <button type="submit">Войти</button>
      <div class="hint" id="loginHint"></div>
    </form>
  </div>

  <script>
    const API_BASE = "https://slc-telegram.printtexttj.workers.dev";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const hint = document.getElementById("loginHint");

      hint.textContent = "Проверяем...";

      try {
        const res = await fetch(API_BASE + "/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Login failed");
        }

        localStorage.setItem("slc_admin_token", data.token);
        window.location.href = "admin-dashboard.html";
      } catch (err) {
        hint.textContent = "Ошибка входа ❌";
      }
    });
  </script>
</body>
</html>
