<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLC Admin Dashboard</title>
  <style>
    :root{
      --bg:#f5f1e8;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --navy:#14243d;
      --navy2:#1b3153;
      --gold:#b08a46;
      --line:rgba(20,36,61,.08);
      --shadow:0 20px 60px rgba(17,24,39,.10);
      --radius:20px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:linear-gradient(180deg,#f5f1e8,#fbf9f4);
      color:var(--text);
      padding:24px;
    }

    .topbar{
      max-width:1200px;
      margin:0 auto 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .title{
      font-size:28px;
      font-weight:800;
    }

    .logout{
      border:none;
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .toolbar{
      padding:16px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:14px;
      text-align:left;
      border-bottom:1px solid var(--line);
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#14243d;
      color:white;
      font-size:13px;
      letter-spacing:.2px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button.action{
      border:none;
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      font-weight:700;
      font-size:12px;
    }

    .new{background:#f3f4f6}
    .progress{background:#fbbf24}
    .done{background:#16a34a;color:#fff}
    .delete{background:#dc2626;color:#fff}

    .status{
      font-weight:700;
      text-transform:capitalize;
    }

    .empty{
      padding:20px;
      color:var(--muted);
    }

    @media (max-width:900px){
      body{padding:12px}
      .wrap{overflow:auto}
      table{min-width:1000px}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">SLC Admin Dashboard</div>
    <button class="logout" id="logoutBtn">Выйти</button>
  </div>

  <div class="wrap">
    <div class="toolbar">
      <div class="hint">Все заявки с сайта</div>
      <div class="hint" id="loadHint">Загружаем...</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Клиент</th>
          <th>Телефон</th>
          <th>Email</th>
          <th>Тема</th>
          <th>Описание</th>
          <th>Статус</th>
          <th>Дата</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="requestsBody"></tbody>
    </table>

    <div class="empty" id="emptyState" style="display:none;">Заявок пока нет.</div>
  </div>

  <script>
    const API_BASE = "https://slc-telegram.printtexttj.workers.dev";

    const token = localStorage.getItem("slc_admin_token");
    if (!token) {
      window.location.href = "admin.html";
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("slc_admin_token");
      window.location.href = "admin.html";
    });

    async function loadRequests() {
      const body = document.getElementById("requestsBody");
      const empty = document.getElementById("emptyState");
      const hint = document.getElementById("loadHint");

      hint.textContent = "Загружаем...";

      try {
        const res = await fetch(API_BASE + "/admin-requests", {
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Load failed");
        }

        body.innerHTML = "";

        if (!data.requests.length) {
          empty.style.display = "block";
          hint.textContent = "Пусто";
          return;
        }

        empty.style.display = "none";

        data.requests.forEach((r) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.first_name} ${r.last_name}</td>
            <td>${r.phone || "—"}</td>
            <td>${r.email || "—"}</td>
            <td>${r.topic || "—"}</td>
            <td>${r.message || "—"}</td>
            <td class="status">${r.status || "new"}</td>
            <td>${r.created_at || "—"}</td>
            <td>
              <div class="actions">
                <button class="action new" onclick="updateStatus(${r.id}, 'new')">New</button>
                <button class="action progress" onclick="updateStatus(${r.id}, 'in_progress')">In Progress</button>
                <button class="action done" onclick="updateStatus(${r.id}, 'done')">Done</button>
                <button class="action delete" onclick="deleteRequest(${r.id})">Delete</button>
              </div>
            </td>
          `;

          body.appendChild(tr);
        });

        hint.textContent = "Обновлено";
      } catch (err) {
        hint.textContent = "Ошибка загрузки";
      }
    }

    async function updateStatus(id, status) {
      await fetch(API_BASE + "/admin-requests", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ id, status })
      });

      loadRequests();
    }

    async function deleteRequest(id) {
      if (!confirm("Удалить заявку?")) return;

      await fetch(API_BASE + "/admin-requests", {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ id })
      });

      loadRequests();
    }

    loadRequests();
  </script>
</body>
</html>
