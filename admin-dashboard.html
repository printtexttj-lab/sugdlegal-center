<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLC Admin Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f5f1e8;padding:20px;color:#111827}
    .top{max-width:1200px;margin:0 auto 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .left{display:flex;align-items:center;gap:12px}
    .logo{width:52px;height:52px;border-radius:14px;background:#fff;border:1px solid #ddd;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .logo img{width:100%;height:100%;object-fit:contain}
    .title{font-size:28px;font-weight:700}
    .btn{background:#14243d;color:#fff;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;text-decoration:none}
    .wrap{max-width:1200px;margin:0 auto;background:#fff;border-radius:16px;overflow:auto;border:1px solid #ddd}
    .bar{padding:14px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    table{width:100%;border-collapse:collapse;min-width:1100px}
    th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}
    th{background:#14243d;color:#fff}
    .actions{display:flex;gap:6px;flex-wrap:wrap}
    .open,.new,.progress,.done,.delete{border:none;padding:7px 9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
    .open{background:#14243d;color:#fff}
    .new{background:#e5e7eb;color:#111827}
    .progress{background:#fbbf24;color:#111827}
    .done{background:#16a34a;color:#fff}
    .delete{background:#dc2626;color:#fff}
  </style>
</head>
<body>
  <div class="top">
    <div class="left">
      <div class="logo"><img src="logo.png" alt="SLC Logo"></div>
      <div class="title">SLC Admin Dashboard</div>
    </div>
    <div>
      <button class="btn" id="refreshBtn">Обновить</button>
      <button class="btn" id="logoutBtn">Выйти</button>
    </div>
  </div>

  <div class="wrap">
    <div class="bar">
      <div>Все заявки с сайта</div>
      <div id="loadHint">Загружаем...</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Клиент</th>
          <th>Телефон</th>
          <th>Email</th>
          <th>Тема</th>
          <th>Описание</th>
          <th>Статус</th>
          <th>Дата</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="requestsBody"></tbody>
    </table>
  </div>

  <script>
    const API_BASE = "https://slc-telegram.printtexttj.workers.dev";
    const token = localStorage.getItem("slc_admin_token");
    if (!token) window.location.href = "admin.html";

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("slc_admin_token");
      window.location.href = "admin.html";
    };

    document.getElementById("refreshBtn").onclick = () => loadRequests();

    async function loadRequests() {
      const body = document.getElementById("requestsBody");
      const hint = document.getElementById("loadHint");
      hint.textContent = "Загружаем...";

      try {
        const res = await fetch(API_BASE + "/admin-requests", {
          headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error("load failed");

        body.innerHTML = "";

        (data.requests || []).forEach((r) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.first_name || ""} ${r.last_name || ""}</td>
            <td>${r.phone || "—"}</td>
            <td>${r.email || "—"}</td>
            <td>${r.topic || "—"}</td>
            <td>${r.message || "—"}</td>
            <td>${r.status || "new"}</td>
            <td>${r.created_at || "—"}</td>
            <td>
              <div class="actions">
                <a class="open" href="case.html?id=${r.id}">Open</a>
                <button class="new" onclick="updateStatus(${r.id}, 'new')">New</button>
                <button class="progress" onclick="updateStatus(${r.id}, 'in_progress')">In Progress</button>
                <button class="done" onclick="updateStatus(${r.id}, 'done')">Done</button>
                <button class="delete" onclick="deleteRequest(${r.id})">Delete</button>
              </div>
            </td>
          `;
          body.appendChild(tr);
        });

        hint.textContent = "Обновлено";
      } catch (e) {
        hint.textContent = "Ошибка загрузки";
      }
    }

    async function updateStatus(id, status) {
      await fetch(API_BASE + "/admin-requests", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ id, status })
      });
      loadRequests();
    }

    async function deleteRequest(id) {
      if (!confirm("Удалить заявку?")) return;
      await fetch(API_BASE + "/admin-requests", {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ id })
      });
      loadRequests();
    }

    loadRequests();
  </script>
</body>
</html>
