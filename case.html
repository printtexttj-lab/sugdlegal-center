<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLC Case</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f1e8;
      --bg2:#fbf9f4;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --navy:#14243d;
      --navy2:#1b3153;
      --gold:#b08a46;
      --line:rgba(20,36,61,.08);
      --shadow:0 24px 70px rgba(17,24,39,.10);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(176,138,70,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(20,36,61,.06), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      padding:24px;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }
    .top-left{
      display:flex;
      align-items:center;
      gap:14px;
    }
    .logo{
      width:54px;
      height:54px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:1px solid rgba(20,36,61,.08);
      overflow:hidden;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }
    .title{
      font-size:28px;
      font-weight:800;
      letter-spacing:-.5px;
    }
    .btn{
      border:none;
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      text-decoration:none;
      display:inline-block;
    }
    .btn:hover{
      filter:brightness(1.03);
    }
    .danger{
      background:#dc2626;
    }
    .gold{
      background:linear-gradient(135deg,var(--gold),#d7b978);
      color:#2a2115;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,243,235,.98));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      position:relative;
      overflow:hidden;
      margin-bottom:18px;
    }
    .card::before{
      content:"";
      position:absolute;
      left:0;top:0;right:0;height:4px;
      background:linear-gradient(90deg,var(--gold),#d7b978);
    }
    .section-title{
      font-size:22px;
      font-weight:800;
      margin:0 0 16px;
      letter-spacing:-.3px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    label{
      display:block;
      margin-bottom:14px;
      font-size:14px;
      font-weight:700;
      color:#374151;
    }
    input, textarea, select{
      width:100%;
      margin-top:8px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      outline:none;
      font:inherit;
      background:#fff;
    }
    textarea{
      min-height:140px;
      resize:vertical;
    }
    input:focus, textarea:focus, select:focus{
      border-color:rgba(176,138,70,.45);
      box-shadow:0 0 0 4px rgba(176,138,70,.10);
    }
    .full{
      grid-column:1 / -1;
    }
    .actions{
      display:flex;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .hint{
      margin-top:14px;
      color:var(--muted);
      min-height:18px;
      font-size:14px;
    }
    .upload-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .file-input{
      flex:1 1 280px;
      background:#fff;
    }
    .files-list{
      display:grid;
      gap:10px;
      margin-top:16px;
    }
    .file-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      flex-wrap:wrap;
    }
    .file-meta{
      min-width:220px;
      flex:1 1 300px;
    }
    .file-name{
      font-weight:700;
      word-break:break-word;
    }
    .file-date{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }
    .file-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .small-btn{
      border:none;
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#14243d;
      color:#fff;
    }
    .small-btn.gold{
      background:linear-gradient(135deg,#b08a46,#d7b978);
      color:#2a2115;
    }
    .small-btn.delete{
      background:#dc2626;
      color:#fff;
    }
    @media (max-width:760px){
      body{padding:12px}
      .grid{grid-template-columns:1fr}
      .full{grid-column:auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="top-left">
        <div class="logo">
          <img src="logo.png" alt="SLC Logo" />
        </div>
        <div class="title">Карточка дела</div>
      </div>

      <a class="btn" href="admin-dashboard.html">← Назад в админку</a>
    </div>

    <div class="card">
      <h2 class="section-title">Данные дела</h2>

      <form id="caseForm">
        <div class="grid">
          <label>
            ID
            <input id="caseId" disabled />
          </label>

          <label>
            Статус
            <select id="status">
              <option value="new">new</option>
              <option value="in_progress">in_progress</option>
              <option value="done">done</option>
            </select>
          </label>

          <label>
            Имя
            <input id="first_name" />
          </label>

          <label>
            Фамилия
            <input id="last_name" />
          </label>

          <label>
            Телефон
            <input id="phone" />
          </label>

          <label>
            Email
            <input id="email" />
          </label>

          <label class="full">
            Тема
            <input id="topic" />
          </label>

          <label class="full">
            Описание
            <textarea id="message"></textarea>
          </label>

          <label class="full">
            Заметка администратора
            <textarea id="admin_note"></textarea>
          </label>
        </div>

        <div class="actions">
          <button type="submit" class="btn">Сохранить изменения</button>
          <button type="button" class="btn danger" id="deleteBtn">Удалить заявку</button>
        </div>

        <div class="hint" id="caseHint"></div>
      </form>
    </div>

    <div class="card">
      <h2 class="section-title">Документы по делу</h2>

      <div class="upload-row">
        <input class="file-input" type="file" id="fileInput" />
        <button class="btn gold" type="button" id="uploadBtn">Загрузить документ</button>
      </div>

      <div class="hint" id="uploadHint"></div>

      <div class="files-list" id="filesList"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://slc-telegram.printtexttj.workers.dev";
    const token = localStorage.getItem("slc_admin_token");

    if (!token) {
      window.location.href = "admin.html";
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      window.location.href = "admin-dashboard.html";
    }

    const caseHint = document.getElementById("caseHint");
    const uploadHint = document.getElementById("uploadHint");
    const filesList = document.getElementById("filesList");

    async function loadCase() {
      caseHint.textContent = "Загружаем...";

      try {
        const res = await fetch(API_BASE + "/admin-request?id=" + encodeURIComponent(id), {
          headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Load failed");
        }

        const r = data.request;

        document.getElementById("caseId").value = r.id || "";
        document.getElementById("status").value = r.status || "new";
        document.getElementById("first_name").value = r.first_name || "";
        document.getElementById("last_name").value = r.last_name || "";
        document.getElementById("phone").value = r.phone || "";
        document.getElementById("email").value = r.email || "";
        document.getElementById("topic").value = r.topic || "";
        document.getElementById("message").value = r.message || "";
        document.getElementById("admin_note").value = r.admin_note || "";

        caseHint.textContent = "Загружено";
      } catch (err) {
        caseHint.textContent = "Ошибка загрузки";
      }
    }

    async function loadFiles() {
      filesList.innerHTML = "";
      uploadHint.textContent = "Загружаем список документов...";

      try {
        const res = await fetch(API_BASE + "/admin-files?id=" + encodeURIComponent(id), {
          headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Files load failed");
        }

        const files = data.files || [];

        if (!files.length) {
          filesList.innerHTML = `<div class="hint">Документов пока нет.</div>`;
          uploadHint.textContent = "";
          return;
        }

        files.forEach((file) => {
          const item = document.createElement("div");
          item.className = "file-item";

          item.innerHTML = `
            <div class="file-meta">
              <div class="file-name">${file.file_name || "Файл"}</div>
              <div class="file-date">${file.uploaded_at || ""}</div>
            </div>
            <div class="file-actions">
              <a class="small-btn" href="${API_BASE}${file.file_url}" target="_blank">Open</a>
              <a class="small-btn gold" href="${API_BASE}${file.file_url}" download="${file.file_name}">Download</a>
              <button class="small-btn" onclick="renameFile(${file.id}, '${String(file.file_name || "").replace(/'/g, "\\'")}')">Rename</button>
              <button class="small-btn delete" onclick="deleteFile(${file.id})">Delete</button>
            </div>
          `;

          filesList.appendChild(item);
        });

        uploadHint.textContent = "";
      } catch (err) {
        uploadHint.textContent = "Ошибка загрузки документов";
      }
    }

    document.getElementById("caseForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      caseHint.textContent = "Сохраняем...";

      try {
        const payload = {
          id: Number(id),
          status: document.getElementById("status").value,
          first_name: document.getElementById("first_name").value.trim(),
          last_name: document.getElementById("last_name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim(),
          topic: document.getElementById("topic").value.trim(),
          message: document.getElementById("message").value.trim(),
          admin_note: document.getElementById("admin_note").value.trim()
        };

        const res = await fetch(API_BASE + "/admin-request", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Save failed");
        }

        caseHint.textContent = "Сохранено ✅";
      } catch (err) {
        caseHint.textContent = "Ошибка сохранения";
      }
    });

    document.getElementById("deleteBtn").addEventListener("click", async () => {
      if (!confirm("Удалить заявку?")) return;

      try {
        const res = await fetch(API_BASE + "/admin-request", {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ id: Number(id) })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Delete failed");
        }

        window.location.href = "admin-dashboard.html";
      } catch (err) {
        caseHint.textContent = "Ошибка удаления";
      }
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const input = document.getElementById("fileInput");
      const file = input.files[0];

      if (!file) {
        uploadHint.textContent = "Выбери файл для загрузки";
        return;
      }

      uploadHint.textContent = "Загружаем документ...";

      try {
        const formData = new FormData();
        formData.append("request_id", String(id));
        formData.append("file", file);

        const res = await fetch(API_BASE + "/admin-upload", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + token
          },
          body: formData
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Upload failed");
        }

        input.value = "";
        uploadHint.textContent = "Документ загружен ✅";
        loadFiles();
      } catch (err) {
        uploadHint.textContent = "Ошибка загрузки документа";
      }
    });

    async function deleteFile(fileId) {
      if (!confirm("Удалить документ?")) return;

      try {
        const res = await fetch(API_BASE + "/admin-file", {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ id: fileId })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Delete file failed");
        }

        loadFiles();
      } catch (err) {
        uploadHint.textContent = "Ошибка удаления документа";
      }
    }

    async function renameFile(fileId, oldName) {
      const newName = prompt("Новое имя файла:", oldName || "");
      if (!newName) return;

      try {
        const res = await fetch(API_BASE + "/admin-file", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            id: fileId,
            file_name: newName.trim()
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Rename failed");
        }

        loadFiles();
      } catch (err) {
        uploadHint.textContent = "Ошибка переименования файла";
      }
    }

    window.deleteFile = deleteFile;
    window.renameFile = renameFile;

    loadCase();
    loadFiles();
  </script>
</body>
</html>
